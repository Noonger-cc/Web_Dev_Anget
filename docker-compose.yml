version: '3'

services:
  web:
    build: ./web
    ports:
      - "5173:5173"
    depends_on:
      - server-go

  server-go:
    build: ./server-go
    ports:
      - "8080:8080"
    volumes:
      - ./server-go:/app
    depends_on:
      - agent-py

  agent-py:
    build: ./agent-py
    ports:
      - "8001:8001"
    volumes:
      - ./agent-py:/app